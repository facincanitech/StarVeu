<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>StarVeu</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#000;height:100%;width:100%;font-family:monospace;}
  canvas{display:block;touch-action:none;}
  #versionBadge{
    position:fixed;bottom:10px;left:12px;z-index:10;font-family:monospace;font-size:10px;
    color:#5f7a99;letter-spacing:0.5px;pointer-events:none;user-select:none;
  }
  #hud{
    position:fixed;top:12px;left:12px;color:#cfe8ff;font-size:12px;
    background:rgba(6,10,18,0.55);padding:10px 14px;border-radius:8px;
    line-height:1.7;z-index:10;max-width:230px;backdrop-filter:blur(3px);
    border:1px solid rgba(140,180,255,0.15);
  }
  #hud .clock{font-size:14px;color:#fff2cc;font-weight:bold;letter-spacing:0.5px;}
  #hud .hint{opacity:0.55;font-size:10px;margin-top:6px;line-height:1.5;}
  #speedRow{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
  .speedBtn{
    font-family:monospace;font-size:10px;background:#111c2e;color:#9fc4e8;
    border:1px solid #2c4160;border-radius:4px;padding:4px 7px;cursor:pointer;
  }
  .speedBtn.active{background:#2a4a70;color:#fff;border-color:#7fbfff;}
  #menuToggleBtn{margin-top:6px;}
  #menuWrap{display:none;}
  #menuWrap.open{display:block;}
  #layerRow{display:flex;flex-direction:column;gap:3px;margin-top:6px;align-items:flex-start;}
  #layerRow .layerCatBtn{width:fit-content;text-align:left;box-sizing:border-box;}
  .layerCatBtn{
    font-family:monospace;font-size:10px;background:#1a1420;color:#c9b8d9;
    border:1px solid #3a2c48;border-radius:4px;padding:4px 7px;cursor:pointer;
  }
  .layerCatBtn.open{background:#4a2a70;color:#fff;border-color:#c07fff;}
  #layerPanel{
    display:none;margin-top:6px;background:rgba(10,8,16,0.85);border:1px solid rgba(192,127,255,0.28);
    border-radius:8px;padding:8px 10px;max-height:38vh;overflow-y:auto;
    width:min(340px, calc(100vw - 24px));
  }
  #layerPanel.open{display:block;}
  #layerPanel .panelHead{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    margin-bottom:6px;font-size:10px;color:#c9b8d9;text-transform:uppercase;letter-spacing:0.5px;
  }
  #layerPanel .panelQuick{
    font-size:9px;color:#9fc4e8;cursor:pointer;background:none;border:none;
    font-family:monospace;padding:0;text-decoration:underline;
  }
  #layerPanel .panelItems{display:flex;flex-wrap:wrap;gap:2px 12px;}
  #layerPanel label{display:flex;align-items:center;gap:5px;font-size:11px;padding:2px 0;cursor:pointer;color:#dfe8f5;white-space:nowrap;}
  #layerPanel input{accent-color:#c07fff;cursor:pointer;}
  #layerPanel .panelSpeedRow{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
  #layerPanel .panelDateRow{display:flex;flex-wrap:wrap;align-items:center;gap:5px;font-size:11px;color:#dfe8f5;}
  #layerPanel .panelDateRow input{
    font-family:monospace;font-size:11px;background:#111c2e;color:#dfe8f5;
    border:1px solid #2c4160;border-radius:4px;padding:3px 5px;width:52px;
  }
  #layerPanel .panelDateGo{
    font-family:monospace;font-size:10px;background:#2a4a70;color:#fff;
    border:1px solid #7fbfff;border-radius:4px;padding:4px 9px;cursor:pointer;
  }
  #layerPanel .neoItem{
    display:flex;flex-direction:column;gap:1px;padding:5px 6px;border-radius:4px;min-width:150px;
  }
  #layerPanel .neoItem:hover{background:rgba(140,180,255,0.1);}
  #layerPanel .neoItem .neoName{font-size:11px;color:#dfe8f5;}
  #layerPanel .neoItem .neoMeta{font-size:9px;color:#9fc4e8;opacity:0.8;}
  #layerPanel .neoItem.hazard .neoName{color:#ff9a7a;}
  #solarPanelWrap{ position:fixed; top:12px; right:12px; z-index:10; }
  #bodyList{
    display:none;margin-top:6px;color:#cfe8ff;font-size:11px;
    background:rgba(6,10,18,0.85);padding:8px 10px;border-radius:8px;
    backdrop-filter:blur(3px);border:1px solid rgba(140,180,255,0.28);
    max-height:60vh;overflow-y:auto;min-width:150px;
  }
  #bodyList.open{display:block;}
  #bodyList div.bItem{
    padding:5px 6px;cursor:pointer;border-radius:4px;white-space:nowrap;
  }
  #bodyList div.bItem:hover{background:rgba(140,180,255,0.12);}
  #bodyList div.bItem.sel{background:rgba(127,191,255,0.22);color:#fff;}
  #infoPanel{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
    color:#eaf6ff;background:rgba(6,10,18,0.72);padding:12px 20px;border-radius:10px;
    z-index:10;display:none;text-align:center;min-width:220px;
    border:1px solid rgba(140,180,255,0.25);backdrop-filter:blur(3px);
  }
  #infoPanel .name{font-size:16px;font-weight:bold;color:#fff2cc;letter-spacing:0.5px;}
  #infoPanel .stat{font-size:11px;opacity:0.8;margin-top:3px;}
  #caseDetailPanel{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(480px, calc(100vw - 32px));max-height:80vh;overflow-y:auto;
    color:#eaf6ff;background:rgba(8,12,20,0.92);padding:16px 18px;border-radius:12px;
    z-index:20;display:none;border:1px solid rgba(140,180,255,0.3);backdrop-filter:blur(4px);
  }
  #caseDetailPanel .name{font-size:17px;font-weight:bold;color:#fff2cc;margin-bottom:8px;padding-right:24px;}
  #caseDetailPanel .text{font-size:12px;line-height:1.55;margin-top:10px;}
  #caseDetailPanel .source{font-size:10px;opacity:0.65;margin-top:8px;font-style:italic;}
  #caseDetailClose{
    position:absolute;top:10px;right:12px;background:none;border:none;color:#cfe8ff;
    font-family:monospace;font-size:15px;cursor:pointer;padding:2px 6px;
  }
  #caseDetailGallery{
    position:relative;margin-top:4px;border-radius:8px;overflow:hidden;
    background:rgba(255,255,255,0.03);
  }
  #caseDetailGallery img{width:100%;height:220px;object-fit:cover;display:block;}
  #caseDetailGallery .caseNoImg{
    font-size:10px;opacity:0.55;padding:40px 0;font-style:italic;text-align:center;
  }
  #caseDetailGallery .galNav{
    position:absolute;top:50%;transform:translateY(-50%);background:rgba(6,10,18,0.6);
    color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;
    font-family:monospace;font-size:14px;line-height:1;
  }
  #caseDetailGallery .galNav.prev{left:6px;}
  #caseDetailGallery .galNav.next{right:6px;}
  #caseDetailGallery .galCount{
    position:absolute;bottom:6px;right:8px;font-size:9px;background:rgba(6,10,18,0.65);
    color:#dfe8f5;padding:2px 6px;border-radius:8px;
  }
  #loading{
    position:fixed;inset:0;background:#000;color:#cfe8ff;display:flex;
    align-items:center;justify-content:center;z-index:100;font-size:13px;letter-spacing:1px;
  }
  #backBtn{
    position:fixed;bottom:130px;left:50%;transform:translateX(-50%);z-index:11;
    display:none;font-family:monospace;font-size:12px;background:rgba(10,16,28,0.75);
    color:#cfe8ff;border:1px solid rgba(140,180,255,0.35);border-radius:8px;
    padding:8px 16px;cursor:pointer;backdrop-filter:blur(3px);
  }
  #backBtn.low{ bottom:20px; } /* sem infoPanel embaixo pra desviar (ex.: modo chão) — pode descer */
  #backBtn:hover{ background:rgba(30,50,80,0.85); }
  #enterPlanetBtn{
    position:fixed;bottom:130px;left:50%;transform:translateX(-50%);z-index:11;
    display:none;font-family:monospace;font-size:12px;background:rgba(20,40,20,0.75);
    color:#dfffcf;border:1px solid rgba(150,255,140,0.35);border-radius:8px;
    padding:8px 16px;cursor:pointer;backdrop-filter:blur(3px);
  }
  #enterPlanetBtn:hover{ background:rgba(30,70,30,0.85); }
  #warpOverlay{
    position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0;
    background:repeating-conic-gradient(from 0deg, rgba(255,255,255,0.9) 0deg 1deg, transparent 1deg 6deg);
    mix-blend-mode:screen;
  }
  #warpOverlay.flash{ background:radial-gradient(circle, var(--warpColor,#fff) 0%, transparent 70%); }
</style>
</head>
<body>

<div id="loading">calculando posições reais...</div>
<div id="versionBadge">StarVeu - v4</div>

<div id="hud">
  <div class="clock" id="clockText">—</div>
  <button id="menuToggleBtn" class="layerCatBtn">☰ Menu</button>
  <div id="menuWrap">
    <div id="layerRow">
      <button class="layerCatBtn" data-layer="time">⏱ Tempo</button>
      <button class="layerCatBtn" data-layer="zodiac">♈ Zodíaco</button>
      <button class="layerCatBtn" data-layer="theoretical">🧪 Teórico</button>
      <button class="layerCatBtn" data-layer="fiction">🖖 Ficção</button>
      <button class="layerCatBtn" data-layer="phenomena">👁 Fenômenos</button>
      <button class="layerCatBtn" data-layer="realExtra">☄️ Corpos menores</button>
      <button class="layerCatBtn" data-layer="neos">🛰 NEOs</button>
      <button id="labelsToggle" class="layerCatBtn open">🏷 Nomes</button>
    </div>
    <div id="layerPanel"></div>
    <div class="hint">
      Desktop: clique+arraste = olhar · WASD = mover · scroll = avançar/recuar<br>
      Mobile: arraste = olhar · pinça = avançar/recuar<br>
      Toque num corpo = focar nele
    </div>
  </div>
</div>

<div id="solarPanelWrap">
  <button class="layerCatBtn" id="solarCatBtn">☀ Solar</button>
  <button class="layerCatBtn" id="groundSightingsBtn" style="display:none;">🛸 Avistamentos</button>
  <div id="bodyList"></div>
</div>

<div id="caseDetailPanel">
  <button id="caseDetailClose">✕</button>
  <div class="name" id="caseDetailName">—</div>
  <div id="caseDetailGallery"></div>
  <div class="text" id="caseDetailText">—</div>
  <div class="source" id="caseDetailSource">—</div>
</div>

<div id="infoPanel">
  <div class="name" id="infoName">—</div>
  <div class="stat" id="infoDist">—</div>
  <div class="stat" id="infoPeriod">—</div>
  <div class="stat" id="infoDiam">—</div>
</div>

<button id="backBtn">← Voltar ao Sistema Solar</button>
<button id="enterPlanetBtn" style="display:none;">↓ Entrar na Terra</button>
<div id="warpOverlay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/astronomy-engine/astronomy.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(function(){
"use strict";

// ---------- DADOS REAIS DOS CORPOS ----------
// distância/período/diâmetro são valores de referência (médios) só pro painel de info.
// a POSIÇÃO em si é sempre calculada ao vivo via astronomy-engine (HelioVector), nunca fixa.
const AU_TO_UNITS = 68; // escala linear: 1 UA real = 68 unidades de cena (era 42 — sistema ficava comprimido/apertado demais)
const TEX = 'texturas/'; // pacote CC-BY 4.0 da Solar System Scope — ver CREDITS.md
// rotationHours = período de rotação sideral REAL (pro giro do planeta na tela bater com a realidade em "tempo real")
// e/i/om/w = elementos orbitais médios J2000 REAIS (excentricidade, inclinação, nó ascendente,
// argumento do periélio) — usados só pra desenhar a linha de órbita como elipse de verdade, não
// círculo perfeito (senão a linha não fica "rente" com o planeta em órbitas mais excêntricas).
const BODIES = [
  { key:'Sun',     name:'Sol',      color:0xffcf70, radius:9,   emissive:0xffb347, isSun:true, texture:TEX+'2k_sun.jpg', rotationHours:609.12 },
  { key:'Mercury', name:'Mercúrio', color:0x9e9e9e, radius:1.1, auRef:0.39, periodRef:'88 dias',    diamRef:'4.879 km',   texture:TEX+'2k_mercury.jpg', rotationHours:1407.6, e:0.20563, i:7.005, om:48.331, w:29.124 },
  { key:'Venus',   name:'Vênus',    color:0xe0c48a, radius:1.9, auRef:0.72, periodRef:'225 dias',   diamRef:'12.104 km', texture:TEX+'2k_venus_surface.jpg', atmosphere:TEX+'2k_venus_atmosphere.jpg', rotationHours:5832.5, e:0.00677, i:3.395, om:76.680, w:54.884 },
  { key:'Earth',   name:'Terra',    color:0x3f7fd6, radius:2.0, auRef:1.00, periodRef:'365,25 dias',diamRef:'12.742 km', texture:TEX+'2k_earth_daymap.jpg', nightTexture:TEX+'2k_earth_nightmap.jpg', clouds:TEX+'2k_earth_clouds.jpg', rotationHours:23.9345, e:0.01671, i:0.000, om:0, w:102.947 },
  { key:'Mars',    name:'Marte',    color:0xc1552c, radius:1.4, auRef:1.52, periodRef:'687 dias',   diamRef:'6.779 km',  texture:TEX+'2k_mars.jpg', rotationHours:24.6229, e:0.09340, i:1.850, om:49.558, w:286.502 },
  { key:'Jupiter', name:'Júpiter',  color:0xd9b38c, radius:5.4, auRef:5.20, periodRef:'11,9 anos',  diamRef:'139.820 km',texture:TEX+'2k_jupiter.jpg', rotationHours:9.925, e:0.04849, i:1.303, om:100.464, w:273.867 },
  { key:'Saturn',  name:'Saturno',  color:0xe8d5a3, radius:4.6, auRef:9.58, periodRef:'29,5 anos',  diamRef:'116.460 km', ring:true, texture:TEX+'2k_saturn.jpg', ringTexture:TEX+'2k_saturn_ring_alpha.png', rotationHours:10.656, e:0.05551, i:2.489, om:113.665, w:339.392 },
  { key:'Uranus',  name:'Urano',    color:0x9fd4e0, radius:3.0, auRef:19.2, periodRef:'84 anos',    diamRef:'50.724 km', texture:TEX+'2k_uranus.jpg', rotationHours:17.24, e:0.04630, i:0.773, om:74.006, w:96.999 },
  { key:'Neptune', name:'Netuno',   color:0x5c7cf0, radius:2.9, auRef:30.05,periodRef:'165 anos',   diamRef:'49.244 km', texture:TEX+'2k_neptune.jpg', rotationHours:16.11, e:0.00899, i:1.770, om:131.784, w:276.336 },
];
const MOON_VISUAL_RADIUS_UNITS = 17; // órbita da Lua artisticamente ampliada (era 9.5 — ficava colada na Terra, quase dentro da frota de naves)
const MOON_TEXTURE = TEX+'2k_moon.jpg';
const texLoader = new THREE.TextureLoader();

// ---------- THREE.JS ----------
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02040a);

// a foto real da Via Láctea volta, mas só como um brilho difuso e escurecido bem no fundo —
// opacidade baixa o suficiente pra dar a sensação de banda luminosa sem dar pra reconhecer
// as constelações reais que estão nela (essas ficam por conta só do que a gente desenha).
(function milkyWayGlow(){
  const geo = new THREE.SphereGeometry(9500, 48, 32);
  const mat = new THREE.MeshBasicMaterial({
    map: texLoader.load(TEX+'2k_stars_milky_way.jpg'),
    color: 0x445566, side: THREE.BackSide, transparent:true, opacity:0.22, depthWrite:false, fog:false,
  });
  scene.add(new THREE.Mesh(geo, mat));
})();
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 20000);
camera.position.set(0, 90, 220);

// grupos: sistema solar / céu profundo (Órion) / estrela visitada — trocam de visibilidade no "salto"
const solarGroup = new THREE.Group();
scene.add(solarGroup);
const skyGroup = new THREE.Group(); // constelações vistas do sistema solar (nosso "céu noturno")
scene.add(skyGroup);
const starSystemGroup = new THREE.Group();
starSystemGroup.visible = false;
scene.add(starSystemGroup);

// estrelas de fundo — pontos normalmente; durante o warp viram traços radiais (efeito hyperspace),
// aproximando o vetor "estrela → centro da tela" pelo vetor "estrela → origem" (câmera fica perto
// da origem o tempo todo comparado ao raio das estrelas de fundo, então a aproximação funciona bem).
const STAR_COUNT = 3000;
const starOuterPos = new Float32Array(STAR_COUNT*3);
for (let i=0;i<STAR_COUNT;i++){
  const r = 1500 + Math.random()*3500;
  const th = Math.random()*Math.PI*2, ph = Math.acos(Math.random()*2-1);
  starOuterPos[i*3]=r*Math.sin(ph)*Math.cos(th); starOuterPos[i*3+1]=r*Math.cos(ph); starOuterPos[i*3+2]=r*Math.sin(ph)*Math.sin(th);
}
const starPointsGeo = new THREE.BufferGeometry();
starPointsGeo.setAttribute('position', new THREE.BufferAttribute(starOuterPos.slice(), 3));
const starPointsMat = new THREE.PointsMaterial({ color:0xffffff, size:1.3, sizeAttenuation:true, transparent:true, opacity:1 });
scene.add(new THREE.Points(starPointsGeo, starPointsMat));

const starStreakGeo = new THREE.BufferGeometry();
const starStreakPos = new Float32Array(STAR_COUNT*2*3); // par [interno, externo] por estrela
for (let i=0;i<STAR_COUNT;i++){
  starStreakPos[i*6+3] = starOuterPos[i*3]; starStreakPos[i*6+4] = starOuterPos[i*3+1]; starStreakPos[i*6+5] = starOuterPos[i*3+2];
}
starStreakGeo.setAttribute('position', new THREE.BufferAttribute(starStreakPos, 3));
const starStreakMat = new THREE.LineBasicMaterial({ color:0xffffff, transparent:true, opacity:0 });
scene.add(new THREE.LineSegments(starStreakGeo, starStreakMat));

// f: 0 (parado, só pontos) -> 1 (traços esticados até quase o centro, tipo hyperspace)
function setStarWarpFactor(f){
  starPointsMat.opacity = 1 - f;
  starStreakMat.opacity = f;
  if (f > 0.001){
    const attr = starStreakGeo.attributes.position;
    const shrink = 1 - f*0.9;
    for (let i=0;i<STAR_COUNT;i++){
      attr.setXYZ(i*2, starOuterPos[i*3]*shrink, starOuterPos[i*3+1]*shrink, starOuterPos[i*3+2]*shrink);
    }
    attr.needsUpdate = true;
  }
}

scene.add(new THREE.AmbientLight(0x223344, 0.55));
const sunLight = new THREE.PointLight(0xfff2cc, 2.4, 0, 0);
scene.add(sunLight);

// esfera lisa (estilo VulcaniS) em vez do low-poly anterior; usa textura quando informada,
// cor sólida como fallback (ex.: enquanto a textura ainda não chegou / não existe pro corpo)
function lowPolyMesh(radius, color, emissive, texture){
  const geo = new THREE.SphereGeometry(radius, 32, 32);
  const map = texture ? texLoader.load(texture) : null;
  const mat = emissive
    ? new THREE.MeshBasicMaterial({ color: map ? 0xffffff : emissive, map })
    : new THREE.MeshStandardMaterial({ color: map ? 0xffffff : color, map, roughness:0.8, metalness:0.05 });
  return new THREE.Mesh(geo, mat);
}

function orbitLine(radiusUnits){
  const pts = [];
  for (let i=0;i<=96;i++){ const a=(i/96)*Math.PI*2; pts.push(new THREE.Vector3(Math.cos(a)*radiusUnits,0,Math.sin(a)*radiusUnits)); }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.LineLoop(geo, new THREE.LineBasicMaterial({ color:0x3a5570, transparent:true, opacity:0.35 }));
}

const OBLIQUITY_RAD = 23.4392911 * Math.PI/180; // obliquidade J2000: converte eclíptica -> equatorial, mesmo referencial que o astronomy-engine usa pros planetas
// linha de órbita como elipse real (não círculo) — usa os elementos e/i/om/w de cada planeta,
// senão a linha não passa exatamente pelo planeta em órbitas mais excêntricas (ex. Mercúrio, Marte)
function orbitEllipseLine(def, auToUnits){
  const pts = [];
  const om = def.om*Math.PI/180, w = def.w*Math.PI/180, inc = def.i*Math.PI/180;
  const cosOm=Math.cos(om), sinOm=Math.sin(om), cosW=Math.cos(w), sinW=Math.sin(w), cosI=Math.cos(inc), sinI=Math.sin(inc);
  for (let k=0;k<=96;k++){
    const nu = (k/96)*Math.PI*2;
    const r = def.auRef*(1-def.e*def.e)/(1+def.e*Math.cos(nu));
    const xo = r*Math.cos(nu), yo = r*Math.sin(nu);
    const xEcl = (cosOm*cosW - sinOm*sinW*cosI)*xo + (-cosOm*sinW - sinOm*cosW*cosI)*yo;
    const yEcl = (sinOm*cosW + cosOm*sinW*cosI)*xo + (-sinOm*sinW + cosOm*cosW*cosI)*yo;
    const zEcl = (sinW*sinI)*xo + (cosW*sinI)*yo;
    const yEq = yEcl*Math.cos(OBLIQUITY_RAD) - zEcl*Math.sin(OBLIQUITY_RAD);
    const zEq = yEcl*Math.sin(OBLIQUITY_RAD) + zEcl*Math.cos(OBLIQUITY_RAD);
    // mesmo mapeamento (scene_x, scene_y, scene_z) = (v.x, v.z*0.35, v.y) usado pro planeta de verdade em updatePositions
    pts.push(new THREE.Vector3(xEcl*auToUnits, zEq*auToUnits*0.35, yEq*auToUnits));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return new THREE.LineLoop(geo, new THREE.LineBasicMaterial({ color:0x3a5570, transparent:true, opacity:0.35 }));
}

const allLabels = []; // toda label criada entra aqui — permite ligar/desligar todos os nomes de uma vez
let labelsVisible = true;
function makeLabel(text){
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  ctx.font = 'bold 42px monospace';
  const pad=14, w=ctx.measureText(text).width+pad*2, h=42+pad*2;
  c.width=w; c.height=h;
  ctx.font='bold 42px monospace';
  ctx.fillStyle='rgba(4,8,16,0.4)'; ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#dff0ff'; ctx.textBaseline='middle'; ctx.fillText(text, pad, h/2);
  const tex = new THREE.CanvasTexture(c);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, depthTest:false, transparent:true }));
  const aspect = w/h;
  sprite.scale.set(aspect*7, 7, 1);
  sprite.visible = labelsVisible;
  allLabels.push(sprite);
  return sprite;
}

const objects = {}; // key -> { mesh, group, label, def, isMoon? }

BODIES.forEach(def=>{
  const mesh = lowPolyMesh(def.radius, def.color, def.emissive, def.texture);
  solarGroup.add(mesh);

  if (def.ring){
    const ringMat = new THREE.MeshStandardMaterial({
      color:0xffffff, side:THREE.DoubleSide, roughness:0.9, transparent:true,
      map: def.ringTexture ? texLoader.load(def.ringTexture) : null,
      alphaMap: def.ringTexture ? texLoader.load(def.ringTexture) : null,
      opacity: def.ringTexture ? 1 : 0.85,
    });
    const ring = new THREE.Mesh(new THREE.RingGeometry(def.radius*1.6, def.radius*2.6, 64), ringMat);
    ring.rotation.x = Math.PI/2 - 0.4;
    mesh.add(ring);
  }
  if (def.clouds){
    const cloudMesh = new THREE.Mesh(
      new THREE.SphereGeometry(def.radius*1.015, 32, 32),
      new THREE.MeshStandardMaterial({ map: texLoader.load(def.clouds), transparent:true, opacity:0.55, depthWrite:false })
    );
    mesh.add(cloudMesh);
  }
  if (def.atmosphere){
    const atmoMesh = new THREE.Mesh(
      new THREE.SphereGeometry(def.radius*1.01, 32, 32),
      new THREE.MeshStandardMaterial({ map: texLoader.load(def.atmosphere), transparent:true, opacity:0.5, depthWrite:false })
    );
    mesh.add(atmoMesh);
  }
  if (def.nightTexture){
    mesh.material.emissiveMap = texLoader.load(def.nightTexture);
    mesh.material.emissive = new THREE.Color(0xffffff);
    mesh.material.emissiveIntensity = 0.9;
    mesh.material.needsUpdate = true;
  }
  if (!def.isSun){
    solarGroup.add(orbitEllipseLine(def, AU_TO_UNITS));
  }
  const label = makeLabel(def.name);
  solarGroup.add(label);

  objects[def.key] = { mesh, label, def };
});

// ---------- CÉU PROFUNDO: catálogo de constelações a partir de coordenadas reais (RA/Dec J2000) ----------
// em vez de posição artística ou de foto de fundo, cada estrela usa ascensão reta + declinação
// reais (catálogo Hipparcos/Yale Bright Star, aproximado) — a direção no céu é astronomicamente
// correta; só a distância radial é "achatada" pra uma esfera única (anos-luz reais não cabem
// numa cena WebGL). isso deixa TODAS as constelações consistentes entre si, mesmo sem imagem
// nenhuma de fundo. pra adicionar uma nova: só empurrar { key, name, color, temp, type, distLy,
// radius, ra (horas), dec (graus) } num array e citar nas linhas.
const SKY_RADIUS = 6000;
function raDec(raHours, decDeg, r = SKY_RADIUS){
  const raRad = raHours * 15 * Math.PI/180, decRad = decDeg * Math.PI/180;
  return [
    Math.cos(decRad) * Math.cos(raRad) * r,
    Math.sin(decRad) * r,
    Math.cos(decRad) * Math.sin(raRad) * r,
  ];
}
function star(key, name, color, temp, type, distLy, radius, ra, dec, extra){
  return { key, name, color, temp, type, distLy, radius, pos: raDec(ra, dec), ...extra };
}

// e cada item liga/desliga sozinho. real fica sempre visível (é a base do app); os outros 4
// grupos guardam um THREE.Group por item, e o estado persiste em localStorage.
const ITEM_VISIBLE_STORAGE_KEY = 'starveu.itemVisible.v1';
let itemVisible = {};
try { itemVisible = JSON.parse(localStorage.getItem(ITEM_VISIBLE_STORAGE_KEY)) || {}; } catch(e){ itemVisible = {}; }
const itemGroupList = []; // { layer, item, group }
function itemKey(layer, item){ return layer + '|' + item; }
function isItemVisible(layer, item){ return itemVisible[itemKey(layer,item)] !== false; }
function registerItemGroup(layer, item, group){
  group.visible = isItemVisible(layer, item);
  itemGroupList.push({ layer, item, group });
  return group;
}
function setItemVisible(layer, item, visible){
  itemVisible[itemKey(layer,item)] = visible;
  itemGroupList.forEach(entry => { if (entry.layer === layer && entry.item === item) entry.group.visible = visible; });
  try { localStorage.setItem(ITEM_VISIBLE_STORAGE_KEY, JSON.stringify(itemVisible)); } catch(e){}
}

// constrói as estrelas/linhas de um catálogo de constelações dentro de um grupo; devolve
// a lista de { mesh, def } pra picking (clique). reaproveitado tanto pro céu do sistema
// solar quanto pro céu de qualquer estrela visitada.
function buildSky(group, constellations){
  const meshes = [];
  constellations.forEach(c=>{
    c.stars.forEach(def=>{
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(def.radius, 24, 24), new THREE.MeshBasicMaterial({ color: def.color }));
      mesh.position.set(...def.pos);
      group.add(mesh);
      const label = makeLabel(def.name);
      label.position.set(def.pos[0], def.pos[1] + def.radius + 40, def.pos[2]);
      label.scale.multiplyScalar(7);
      group.add(label);
      meshes.push({ mesh, def });
    });
    c.lines.forEach(([a,b])=>{
      const pa = c.stars.find(s=>s.key===a).pos, pb = c.stars.find(s=>s.key===b).pos;
      const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(...pa), new THREE.Vector3(...pb)]);
      group.add(new THREE.Line(geo, new THREE.LineBasicMaterial({ color:0x5580aa, transparent:true, opacity:0.5 })));
    });
  });
  return meshes;
}

// separa cada constelação num subgrupo por ITEM dentro da camada (real fica direto no
// parentGroup, sem toggle; zodíaco = 1 subgrupo por constelação, ficção = 1 subgrupo por
// universo) — devolve a lista completa de meshes clicáveis, do mesmo jeito que buildSky.
function populateSky(parentGroup, constellations){
  const byKey = {};
  const real = [];
  constellations.forEach(c=>{
    const layer = c.zodiac ? 'zodiac' : c.layer;
    if (!layer) { real.push(c); return; }
    const item = layer === 'zodiac' ? c.name : (c.universe || c.name);
    const k = itemKey(layer, item);
    (byKey[k] = byKey[k] || { layer, item, list:[] }).list.push(c);
  });
  let meshes = buildSky(parentGroup, real);
  Object.values(byKey).forEach(({layer, item, list})=>{
    const g = registerItemGroup(layer, item, new THREE.Group());
    parentGroup.add(g);
    meshes = meshes.concat(buildSky(g, list));
  });
  return meshes;
}

// ---------- CAMADA "CATÁLOGO REAL" (escala do sistema solar): objetos interestelares confirmados,
// maiores corpos do cinturão de asteroides, e principais luas dos planetas gigantes — tudo com
// elementos orbitais REAIS (fonte: JPL Small-Body Database / NASA planetary fact sheets).
// Pequenos corpos (interestelares + cinturão) usam mecânica Kepleriana completa (elipse ou
// hipérbole, conforme a excentricidade seja menor ou maior que 1) a partir do periélio real. Luas usam órbita circular com
// período/inclinação/proporção de distância reais — fase inicial é aproximada (não é uma
// efeméride oficial minuto a minuto, ao contrário dos planetas/Lua da Terra via astronomy-engine).
const MU_SUN = 0.00029591220828559104; // GM do Sol em UA³/dia² (constante gravitacional gaussiana ao quadrado)
const J2000_MS = Date.UTC(2000,0,1,12,0,0);
function dateToJD(d){ return d.getTime()/86400000 + 2440587.5; }

// GMST (Greenwich Mean Sidereal Time) — dá o ângulo real de "pra onde a Terra tá virada" num
// instante qualquer, independente da posição orbital dela. É o jeito certo de sincronizar o giro
// da textura com a hora real (a rotação "por velocidade" sozinha acerta a velocidade, mas não a
// fase — ela sempre começava do mesmo jeito, por isso o lado dia/noite não batia com a hora certa).
function greenwichSiderealAngleRad(date){
  const jd = dateToJD(date);
  const D = jd - 2451545.0;
  const T = D/36525;
  let gmstDeg = 280.46061837 + 360.98564736629*D + 0.000387933*T*T - (T*T*T)/38710000;
  gmstDeg = ((gmstDeg % 360) + 360) % 360;
  return gmstDeg * Math.PI/180;
}
// calibração fina: se a Terra abrir com o lado dia/noite girado (ex.: mostrando dia onde devia ser
// noite), ajuste esse valor em graus — o resto do cálculo (GMST) já é astronomicamente correto.
const EARTH_TEXTURE_OFFSET_DEG = 0;
function solveKeplerEllipse(M, e){
  let E = e < 0.8 ? M : Math.PI;
  for (let i=0;i<50;i++){
    const dE = (E - e*Math.sin(E) - M)/(1 - e*Math.cos(E));
    E -= dE;
    if (Math.abs(dE) < 1e-9) break;
  }
  return E;
}
function solveKeplerHyperbolic(M, e){
  let H = (Math.sign(M)||1) * Math.log(2*Math.abs(M)/e + 1.8);
  for (let i=0;i<80;i++){
    const dH = (e*Math.sinh(H) - H - M)/(e*Math.cosh(H) - 1);
    H -= dH;
    if (Math.abs(dH) < 1e-9) break;
  }
  return H;
}
// el: { e, a (UA, corpos elípticos) ou q (UA, periélio — pra hiperbólicos), i, om, w (graus), tpJD (data do periélio em dia juliano) }
function keplerHelioAU(el, dateJD){
  const a = el.a !== undefined ? el.a : el.q/(1 - el.e);
  const n = Math.sqrt(MU_SUN/Math.abs(a*a*a)); // rad/dia
  const M = n * (dateJD - el.tpJD);
  let r, nu;
  if (el.e < 1){
    const E = solveKeplerEllipse(M % (2*Math.PI), el.e);
    r = a*(1 - el.e*Math.cos(E));
    nu = 2*Math.atan2(Math.sqrt(1+el.e)*Math.sin(E/2), Math.sqrt(1-el.e)*Math.cos(E/2));
  } else {
    const H = solveKeplerHyperbolic(M, el.e);
    r = a*(1 - el.e*Math.cosh(H));
    nu = 2*Math.atan2(Math.sqrt(el.e+1)*Math.sinh(H/2), Math.sqrt(el.e-1)*Math.cosh(H/2));
  }
  const xo = r*Math.cos(nu), yo = r*Math.sin(nu);
  const om = el.om*Math.PI/180, w = el.w*Math.PI/180, inc = el.i*Math.PI/180;
  const cosOm=Math.cos(om), sinOm=Math.sin(om), cosW=Math.cos(w), sinW=Math.sin(w), cosI=Math.cos(inc), sinI=Math.sin(inc);
  const xEcl = (cosOm*cosW - sinOm*sinW*cosI)*xo + (-cosOm*sinW - sinOm*cosW*cosI)*yo;
  const yEcl = (sinOm*cosW + cosOm*sinW*cosI)*xo + (-sinOm*sinW + cosOm*cosW*cosI)*yo;
  const zEcl = (sinW*sinI)*xo + (cosW*sinI)*yo;
  const yEq = yEcl*Math.cos(OBLIQUITY_RAD) - zEcl*Math.sin(OBLIQUITY_RAD);
  const zEq = yEcl*Math.sin(OBLIQUITY_RAD) + zEcl*Math.cos(OBLIQUITY_RAD);
  return { x:xEcl, y:yEq, z:zEq }; // já no formato (v.x, v.y, v.z) equatorial usado pro resto do código (updatePositions remapeia igual aos planetas)
}

// nuvem de detrito de Saturno — partículas na mesma faixa/inclinação do anel já existente
// (o anel É um disco de detrito de gelo/rocha; isso só adiciona leitura volumétrica a mais
// do que a textura plana já dá). Filha do mesh de Saturno: acompanha o planeta automaticamente.
(function saturnDebrisCloud(){
  const satRadius = BODIES.find(b=>b.key==='Saturn').radius;
  const count = 2200;
  const positions = new Float32Array(count*3);
  for (let i=0;i<count;i++){
    const r = satRadius*1.6 + Math.random()*(satRadius*1.1); // mesma faixa do RingGeometry já usado (1.6x a 2.6x o raio)
    const a = Math.random()*Math.PI*2;
    const h = (Math.random()-0.5)*satRadius*0.02;
    positions[i*3] = Math.cos(a)*r;
    positions[i*3+1] = h;
    positions[i*3+2] = Math.sin(a)*r;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color:0xd9d0b8, size:0.035, transparent:true, opacity:0.55, sizeAttenuation:true });
  const points = new THREE.Points(geo, mat);
  points.rotation.x = -0.4; // as partículas já nascem deitadas no plano XZ (não em pé como o RingGeometry), só falta o mesmo tilt extra do anel de textura (era +Math.PI/2 a mais, por isso saía 90° errado)
  // sem toggle — é real (o anel É detrito de gelo/rocha), fica sempre visível igual à Lua da Terra
  objects['Saturn'].mesh.add(points);
})();

function metalMat(color, roughness=0.42, metalness=0.65){
  return new THREE.MeshStandardMaterial({ color, roughness, metalness, side:THREE.DoubleSide });
}
function glowMat(color, opacity=1){
  return new THREE.MeshBasicMaterial({ color, transparent: opacity < 1, opacity, side:THREE.DoubleSide });
}
function addPart(group, geo, mat, pos=[0,0,0], rot=[0,0,0], scale=[1,1,1]){
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(...pos);
  mesh.rotation.set(...rot);
  mesh.scale.set(...scale);
  group.add(mesh);
  return mesh;
}

}

  const group = new THREE.Group();
  const R = s.size;
  const hull = metalMat(s.color,0.34,0.72);
  const dark = metalMat(0x30363d,0.55,0.55);
  const accent = glowMat(s.accent,0.92);

  if (s.universe === 'Star Trek'){

function seededRand(seed){
  let s = seed >>> 0;
  return function(){
    s = (s * 1664525 + 1013904223) >>> 0;
    return s / 4294967296;
  };
}

      addPart(group, new THREE.ConeGeometry(R*0.08,R*0.35,12), light, [side*R*0.58,0,-R*0.54], [Math.PI/2,0,0]);
    });
  } else {
    addPart(group, new THREE.CylinderGeometry(R*0.22,R*0.28,R*0.9,18), hull, [0,0,0], [Math.PI/2,0,0]);
    for (let i=0;i<3;i++){

let realBaseDate = new Date();
let simElapsedMs = 0;   // tempo simulado acumulado desde que a página abriu
let timeMultiplier = 1; // 1 = tempo real; outros valores aceleram

function currentSimDate(){
  return new Date(realBaseDate.getTime() + simElapsedMs);
}

function updatePositions(date){
  const t = Astronomy.MakeTime(date);
  BODIES.forEach(def=>{
    const obj = objects[def.key];
    if (def.isSun){ obj.mesh.position.set(0,0,0); obj.label.position.set(0, def.radius+6, 0); return; }
    let v;
    try { v = Astronomy.HelioVector(Astronomy.Body[def.key], t); }
    catch(e){ return; }
    const x = v.x * AU_TO_UNITS, y = v.z * AU_TO_UNITS, z = v.y * AU_TO_UNITS;
    obj.mesh.position.set(x, y*0.35, z); // achata levemente a inclinação p/ leitura visual mais clara
    obj.label.position.set(x, y*0.35 + def.radius + 4, z);
    if (def.key === 'Earth'){
      obj.mesh.rotation.y = -greenwichSiderealAngleRad(date) + EARTH_TEXTURE_OFFSET_DEG*Math.PI/180;
    }
  });

  // lua: usa a DIREÇÃO real (GeoMoon) em torno da terra, raio artístico p/ ficar visível
  try{
    const earthPos = objects['Earth'].mesh.position;
    const gm = Astronomy.GeoMoon(t);
    const len = Math.hypot(gm.x, gm.y, gm.z) || 1;
    const dx = gm.x/len, dy = gm.z/len, dz = gm.y/len;
    moonMesh.position.set(
      earthPos.x + dx*MOON_VISUAL_RADIUS_UNITS,
      earthPos.y + dy*MOON_VISUAL_RADIUS_UNITS*0.35,
      earthPos.z + dz*MOON_VISUAL_RADIUS_UNITS
    );
    moonLabel.position.set(moonMesh.position.x, moonMesh.position.y+1.6, moonMesh.position.z);
  }catch(e){}

  // catálogo real ampliado: interestelares + maiores asteroides do cinturão (mecânica Kepleriana real)
  const dateJD = dateToJD(date);
  realSmallBodies.forEach(b=>{
    try{
      const v = keplerHelioAU(b.def, dateJD);
      const x = v.x*AU_TO_UNITS, y = v.z*AU_TO_UNITS, z = v.y*AU_TO_UNITS;
      b.mesh.position.set(x, y*0.35, z);
      b.label.position.set(x, y*0.35 + b.def.radius + 3, z);
    }catch(e){}
  });

  // luas reais dos planetas gigantes: órbita circular em torno da posição ao vivo do planeta-mãe
  const daysSinceJ2000 = (date.getTime() - J2000_MS) / 86400000;
  realMoons.forEach(m=>{
    const anchorObj = objects[m.def.anchor];
    if (!anchorObj) return;
    const parent = anchorObj.mesh.position;
    const angle = (daysSinceJ2000 / m.def.periodDays) * Math.PI*2 * (m.def.retrograde ? -1 : 1);
    const tilt = m.def.tiltDeg*Math.PI/180;
    const r = m.def.orbitRatio * anchorObj.def.radius;
    const lx = Math.cos(angle)*r, lzFlat = Math.sin(angle)*r;
    const ly = lzFlat*Math.sin(tilt), lz = lzFlat*Math.cos(tilt);
    m.mesh.position.set(parent.x+lx, parent.y+ly, parent.z+lz);
    m.label.position.set(m.mesh.position.x, m.mesh.position.y + m.def.radius + 1, m.mesh.position.z);
  });

  clockTextEl.textContent = date.toLocaleString('pt-BR', { dateStyle:'medium', timeStyle:'medium' });
}

// ---------- SALTO: efeito de "viagem na luz" trocando pro sistema da estrela clicada ----------
const warpOverlayEl = document.getElementById('warpOverlay');
const backBtnEl = document.getElementById('backBtn');
let transitioning = false;

// warp = boost de FOV + estrelas de fundo esticando em traços radiais, em sincronia; a cena
// (sol/planetas <-> estrela visitada) troca exatamente no pico, quando a tela já estourou de luz.
const WARP_DURATION_MS = 900;
const WARP_BASE_FOV = camera.fov;

function warpEffect(colorHex, onPeak){
  if (transitioning) return;
  transitioning = true;
  flying = false; dragging = false;
  warpOverlayEl.style.setProperty('--warpColor', colorHex);

  const start = performance.now();
  let swapped = false;

  function step(now){
    const t = Math.min(1, (now - start) / WARP_DURATION_MS);
    const warpFactor = Math.sin(t * Math.PI); // 0 -> 1 -> 0

    camera.fov = WARP_BASE_FOV + warpFactor * 55; // ~55° -> ~110° no pico -> volta
    camera.updateProjectionMatrix();
    setStarWarpFactor(warpFactor);
    warpOverlayEl.style.opacity = warpFactor;
    warpOverlayEl.classList.toggle('flash', warpFactor > 0.85);

    if (!swapped && t >= 0.5){ swapped = true; onPeak(); }

    if (t < 1){ requestAnimationFrame(step); }
    else {
      camera.fov = WARP_BASE_FOV;
      camera.updateProjectionMatrix();
      setStarWarpFactor(0);
      warpOverlayEl.style.opacity = 0;
      warpOverlayEl.classList.remove('flash');
      transitioning = false;
    }
  }
  requestAnimationFrame(step);
}

function addFictionPlanetFeatures(pMesh, p){
  if (!p.feature) return;
  const r = p.radius;
  if (p.feature === 'pyramid'){
    const base = addPart(pMesh, new THREE.CylinderGeometry(r*0.34,r*0.42,r*0.035,4), metalMat(0xc99b5a,0.72,0.12), [0,r*1.015,0], [0,Math.PI/4,0]);
    const pyramid = addPart(pMesh, new THREE.ConeGeometry(r*0.34,r*0.42,4), metalMat(0xe0b36d,0.68,0.08), [0,r*1.23,0], [0,Math.PI/4,0]);
    addPart(pMesh, new THREE.SphereGeometry(r*0.045,10,8), glowMat(0x7fd8ff,0.85), [0,r*1.47,0]);
    [base,pyramid].forEach(m=>m.lookAt(new THREE.Vector3(0,r*3,0)));
  }
  if (p.feature === 'resolute'){
    const station = new THREE.Group();
    station.position.set(r*1.65, r*0.25, 0);
    station.rotation.z = 0.35;
    addPart(station, new THREE.TorusGeometry(r*0.34,r*0.025,8,42), metalMat(0xb9c6d0,0.38,0.68), [0,0,0], [Math.PI/2,0,0]);
    addPart(station, new THREE.CylinderGeometry(r*0.045,r*0.045,r*0.72,12), metalMat(0xdfe7ed,0.34,0.72), [0,0,0], [0,0,Math.PI/2]);
    addPart(station, new THREE.BoxGeometry(r*0.5,r*0.035,r*0.16), metalMat(0x10263f,0.25,0.2), [0,r*0.2,0]);
    addPart(station, new THREE.SphereGeometry(r*0.05,10,8), glowMat(0x3fd6c8,0.9), [r*0.42,0,0]);
    pMesh.add(station);
  }
}

  const starLight = new THREE.PointLight(def.color, 2.5, 0, 0);
  starSystemGroup.add(starLight);
  const label = makeLabel(def.name);
  label.position.set(0, 24, 0);
  starSystemGroup.add(label);

  (def.planets || []).forEach(p=>{
    if (p.fictional && !isItemVisible('fiction', p.universe)) return; // respeita o toggle do universo mesmo dentro da estrela
    const pMesh = lowPolyMesh(p.radius, p.color, 0, p.texture);
    addFictionPlanetFeatures(pMesh, p);
    starSystemGroup.add(pMesh);
    starSystemGroup.add(orbitLine(p.orbitRadius));
    const pLabel = makeLabel(p.name);
    starSystemGroup.add(pLabel);
    starPlanets.push({ mesh:pMesh, label:pLabel, orbitRadius:p.orbitRadius, periodSec:p.periodSec });
  });

  // céu visto dessa estrela: as mesmas constelações, só sem a própria estrela (as vizinhas continuam
  // visíveis — não estão "grudadas", mas continuam por perto) + o marcador do Sol pra voltar.
  const otherConstellations = ALL_CONSTELLATIONS
    .map(c => {
      const stars = c.stars.filter(s => s.key !== def.key);
      const keys = new Set(stars.map(s => s.key));
      return { ...c, stars, lines: c.lines.filter(([a,b]) => keys.has(a) && keys.has(b)) };
    })
    .filter(c => c.stars.length > 0);
  starSkyMeshes = populateSky(starSystemGroup, otherConstellations);
  const homeMesh = new THREE.Mesh(new THREE.SphereGeometry(HOME_MARKER.radius, 24, 24), new THREE.MeshBasicMaterial({ color: HOME_MARKER.color }));
  homeMesh.position.set(...HOME_MARKER.pos);
  starSystemGroup.add(homeMesh);
  const homeLabel = makeLabel(HOME_MARKER.name);
  homeLabel.position.set(HOME_MARKER.pos[0], HOME_MARKER.pos[1] + HOME_MARKER.radius + 40, HOME_MARKER.pos[2]);
  homeLabel.scale.multiplyScalar(7);
  starSystemGroup.add(homeLabel);
  starSkyMeshes.push({ mesh: homeMesh, def: HOME_MARKER });

  solarGroup.visible = false;
  skyGroup.visible = false;
  sunLight.visible = false;
  starSystemGroup.visible = true;
  backBtnMode = 'starSystem';
  backBtnEl.textContent = '← Voltar ao Sistema Solar';
  backBtnEl.style.display = 'block';

  camera.position.set(0, 15, 55);
  yaw = -Math.PI/2; pitch = -0.15; applyLook();

  infoNameEl.textContent = def.name;
  infoDistEl.textContent = `Distância da Terra: ${def.distLy}`;
  infoPeriodEl.textContent = def.type;
  infoDiamEl.textContent = `Temperatura superficial: ${def.temp}`;
  infoPanelEl.style.display = 'block';
}

function exitStarSystem(){
  solarGroup.visible = true;
  skyGroup.visible = true;
  sunLight.visible = true;
  starSystemGroup.visible = false;
  starPlanets = [];
  backBtnEl.style.display = 'none';

  camera.position.set(0, 90, 220);
  yaw = -Math.PI/4; pitch = -0.35; applyLook();
  infoPanelEl.style.display = 'none';
}

function warpToStar(def){
  const hex = '#' + def.color.toString(16).padStart(6,'0');
  warpEffect(hex, ()=> enterStarSystem(def));
}
function warpToSolarSystem(){
  warpEffect('#7fbfff', exitStarSystem);
}
backBtnEl.addEventListener('click', ()=>{
  if (backBtnMode === 'ground') exitGroundMode();
  else warpToSolarSystem();
});

let selectedKey = null;
function focusOn(key){
  selectedKey = key;
  document.querySelectorAll('#bodyList .bItem').forEach(el=>{
    el.classList.toggle('sel', el.textContent === (key==='Moon'?'Lua':BODIES.find(b=>b.key===key)?.name));
  });
  showInfo(key);
  const targetMesh = key==='Moon' ? moonMesh : objects[key].mesh;
  flyTarget = targetMesh;
  flyOffset = new THREE.Vector3(0, 8, 22);
  flyStartPos = camera.position.clone();
  flyStartQuat = camera.quaternion.clone();
  flyProgress = 0;
  flying = true;
}

// ---------- CÂMERA LIVRE (fly-cam) ----------
// yaw inicial: -90° olhava pra Saturno; André pediu 45° pra esquerda (só no horizontal, mesma
// altura/pitch) pra abrir olhando pra Terra em vez disso.
let yaw = -Math.PI/4, pitch = -0.35;
const moveState = { fwd:false, back:false, left:false, right:false, up:false, down:false };
let dragging = false, lastX=0, lastY=0;
let flying = false, flyTarget=null, flyStartPos=null, flyStartQuat=null, flyProgress=0;
let flyOffset = new THREE.Vector3(0, 8, 22); // offset da câmera em relação ao alvo, usado no voo até focusOn()

function applyLook(){
  const q = new THREE.Quaternion().setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
  camera.quaternion.copy(q);
}
applyLook();

function forwardVec(){ return new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); }

let backBtnMode = 'starSystem'; // o que o botão "voltar" faz depende do modo atual ('starSystem' ou 'ground')

// ---------- "MODO CHÃO": cena separada, tipo tela inicial do Stellarium — pousa numa planície
// genérica (não é nenhum lugar real, é só o "saguão" visual), olha em volta livremente, e o painel
// da direita vira a lista de Avistamentos (clicar um caso abre o painel de detalhe por cima, sem
// sair do chão). Só disponível pra Terra, por enquanto — não é astronomicamente exato (sem posição
// real do sol no céu ainda), é decorativo/funcional pra dar acesso à camada.
let groundMode = false;
// fundo do modo chão: imagem FLAT (não panorâmica) de tela cheia — André desistiu do 360 (ficava
// pixelado até em 4K) e mandou uma foto normal (landscape4k2.jpg, 6016x4016, proporção 3:2) pra
// preencher a tela como pano de fundo. Usa `scene.background`, que é a forma nativa do Three.js
// de fazer isso: preenche o canvas inteiro sem distorção, sem precisar de geometria nenhuma.
const SOLAR_SCENE_BG = scene.background; // guarda o fundo original (cor sólida) pra restaurar ao sair
const groundBgTexture = texLoader.load(TEX+'landscape4k2.jpg');

const enterPlanetBtnEl = document.getElementById('enterPlanetBtn');
function enterGroundMode(){
  flying = false;
  groundMode = true;
  solarGroup.visible = false; skyGroup.visible = false; sunLight.visible = false;
  scene.background = groundBgTexture;
  camera.position.set(0, 1.7, 0);
  yaw = -Math.PI/2; pitch = -0.05; applyLook();
  backBtnMode = 'ground';
  backBtnEl.textContent = '← Sair da Terra';
  backBtnEl.style.display = 'block';
  backBtnEl.classList.add('low');
  enterPlanetBtnEl.style.display = 'none';
  infoPanelEl.style.display = 'none';
  solarCatBtnEl.style.display = 'none';
  groundSightingsBtnEl.style.display = 'block';
  renderGroundBodyList();
  bodyListEl.classList.remove('open'); groundSightingsBtnEl.classList.remove('open');
}
function exitGroundMode(){
  groundMode = false;
  solarGroup.visible = true; skyGroup.visible = true; sunLight.visible = true;
  scene.background = SOLAR_SCENE_BG;
  caseDetailPanelEl.style.display = 'none';
  backBtnMode = 'starSystem';
  backBtnEl.textContent = '← Voltar ao Sistema Solar';
  backBtnEl.style.display = 'none';
  backBtnEl.classList.remove('low');
  solarCatBtnEl.style.display = 'block';
  groundSightingsBtnEl.style.display = 'none';
  bodyListEl.classList.remove('open'); groundSightingsBtnEl.classList.remove('open');
  renderSolarBodyList();
  camera.position.set(0, 90, 220);
  yaw = -Math.PI/4; pitch = -0.35; applyLook();
}
enterPlanetBtnEl.addEventListener('click', enterGroundMode);

function rightVec(){ return new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); }

const dom = renderer.domElement;
const raycaster = new THREE.Raycaster();
const ndc = new THREE.Vector2();

function pickAt(x,y){
  if (transitioning) return;
  const rect = dom.getBoundingClientRect();
  ndc.x = ((x-rect.left)/rect.width)*2-1;
  ndc.y = -((y-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(ndc, camera);

  if (solarGroup.visible){
    const meshes = Object.values(objects).map(o=>o.mesh).concat([moonMesh]);
    const hit = raycaster.intersectObjects(meshes, true)[0];
    if (hit){
      if (hit.object === moonMesh){ focusOn('Moon'); return; }
      const found = Object.entries(objects).find(([k,o])=>o.mesh===hit.object || hit.object.parent===o.mesh);
      if (found){ focusOn(found[0]); return; }
    }

    // camadas teórico/ficção/fenômenos (Vulcano hipotético, Nibiru, naves da Lua, marcador de fenômeno)

    const extra = theoreticalMeshes
      .concat(moonShips.map(o=>({ mesh:o.group, def:o.def })))
      .concat(phenomenaMeshes)
      .concat(realSmallBodies)
      .concat(realMoons);
    const extraObjects = extra.map(o=>o.mesh);
    const extraHit = raycaster.intersectObjects(extraObjects, true)[0];
    if (extraHit){
      const found = extra.find(o => o.mesh === extraHit.object || extraHit.object.parent === o.mesh);
      if (found){ showBodyInfo(found.def); return; }
    }
  }

  if (skyGroup.visible){
    const hit = raycaster.intersectObjects(skyMeshes.map(o=>o.mesh))[0];
    if (hit){
      const found = skyMeshes.find(o=>o.mesh===hit.object);
      if (found) warpToStar(found.def);
    }
    return;
  }

  if (starSystemGroup.visible){
    const hit = raycaster.intersectObjects(starSkyMeshes.map(o=>o.mesh))[0];
    if (hit){
      const found = starSkyMeshes.find(o=>o.mesh===hit.object);
      if (found){ found.def.isHome ? warpToSolarSystem() : warpToStar(found.def); }
    }
  }
}

// mouse (desktop)
let mouseDownX=0, mouseDownY=0, mouseMoved=false;
dom.addEventListener('mousedown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; mouseDownX=e.clientX; mouseDownY=e.clientY; mouseMoved=false; });
window.addEventListener('mouseup', e=>{
  dragging=false;
  if (!mouseMoved) pickAt(e.clientX, e.clientY);
});
window.addEventListener('mousemove', e=>{
  if (!dragging) return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  if (Math.abs(e.clientX-mouseDownX)+Math.abs(e.clientY-mouseDownY) > 5) mouseMoved=true;
  yaw -= dx*0.0028; pitch -= dy*0.0028;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
  applyLook();
  lastX=e.clientX; lastY=e.clientY;
});
window.addEventListener('wheel', e=>{
  if (groundMode) return; // dentro da Terra só olha em volta, não "anda" (sem dolly de scroll)
  flying=false;
  const dist = e.deltaY*0.4;
  camera.position.addScaledVector(forwardVec(), -dist);
}, { passive:true });
window.addEventListener('keydown', e=>{
  const k=e.key.toLowerCase();
  if (k==='w') moveState.fwd=true; if (k==='s') moveState.back=true;
  if (k==='a') moveState.left=true; if (k==='d') moveState.right=true;
  if (k===' ') moveState.up=true; if (k==='shift') moveState.down=true;
});
window.addEventListener('keyup', e=>{
  const k=e.key.toLowerCase();
  if (k==='w') moveState.fwd=false; if (k==='s') moveState.back=false;
  if (k==='a') moveState.left=false; if (k==='d') moveState.right=false;
  if (k===' ') moveState.up=false; if (k==='shift') moveState.down=false;
});

// touch (mobile): 1 dedo arrasta = olhar / toque curto = selecionar; 2 dedos = pinça pra avançar-recuar
// (joystick virtual foi testado e removido de novo — André achou que arrastar+pinça já basta)
let touchMode=null, touchStartDist=0, touchStartX=0, touchStartY=0, touchMoved=false, touchStartTime=0;
dom.addEventListener('touchstart', e=>{
  flying = false;
  if (e.touches.length===1){
    touchMode='look'; touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
    lastX=touchStartX; lastY=touchStartY; touchMoved=false; touchStartTime=Date.now();
  } else if (e.touches.length===2){
    touchMode='pinch';
    touchStartDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
}, { passive:true });
dom.addEventListener('touchmove', e=>{
  if (touchMode==='look' && e.touches.length===1){
    const dx=e.touches[0].clientX-lastX, dy=e.touches[0].clientY-lastY;
    if (Math.abs(e.touches[0].clientX-touchStartX)+Math.abs(e.touches[0].clientY-touchStartY) > 8) touchMoved=true;
    yaw -= dx*0.0032; pitch -= dy*0.0032;
    pitch = Math.max(-1.5, Math.min(1.5, pitch));
    applyLook();
    lastX=e.touches[0].clientX; lastY=e.touches[0].clientY;
  } else if (touchMode==='pinch' && e.touches.length===2 && !groundMode){
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    const delta = d - touchStartDist;
    camera.position.addScaledVector(forwardVec(), delta*0.6);
    touchStartDist = d;
  }
}, { passive:true });
dom.addEventListener('touchend', e=>{
  if (touchMode==='look' && !touchMoved && Date.now()-touchStartTime < 400){
    pickAt(touchStartX, touchStartY);
  }
  touchMode=null;
}, { passive:true });

window.addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- LOOP ----------
const clock = new THREE.Clock();
let posUpdateAccum = 0;

document.getElementById('loading').style.display='none';
updatePositions(currentSimDate());

function animate(){
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  simElapsedMs += dt*1000*timeMultiplier;

  // rotação própria de cada planeta usa o período sideral REAL — em "tempo real" o giro
  // bate com a velocidade de rotação de verdade (antes era um incremento fixo, sem relação com o planeta)
  const simSecondsThisFrame = dt*timeMultiplier;
  BODIES.forEach(def=>{
    const obj = objects[def.key];
    if (!obj || !def.rotationHours || def.key === 'Earth') return; // Terra usa GMST (fase real), não incremento — ver updatePositions()
    obj.mesh.rotation.y += (simSecondsThisFrame/(def.rotationHours*3600))*Math.PI*2;
  });

  posUpdateAccum += dt;
  if (posUpdateAccum > 0.15){ // recalcula ~6-7x/s, suficiente mesmo em velocidade alta
    posUpdateAccum = 0;
    updatePositions(currentSimDate());
  }

  // planetas fictícios de estrelas visitadas (ex.: Mintaka b) — órbita simples, não ligada ao tempo real
  starSystemElapsed += dt;
  starPlanets.forEach(p=>{
    const angle = (starSystemElapsed / p.periodSec) * Math.PI * 2;
    const x = Math.cos(angle)*p.orbitRadius, z = Math.sin(angle)*p.orbitRadius;
    p.mesh.position.set(x, 0, z);
    p.mesh.rotation.y += dt*0.3;
    p.label.position.set(x, p.mesh.geometry.parameters.radius + 4, z);
  });

  // corpos teóricos (Vulcano hipotético, Nibiru) — órbita simples ao redor do Sol
  theoreticalMeshes.forEach(tb=>{
    const angle = (starSystemElapsed / tb.def.periodSec) * Math.PI * 2;
    const x = Math.cos(angle)*tb.def.orbitRadius, z = Math.sin(angle)*tb.def.orbitRadius;
    tb.mesh.position.set(x, 0, z);
    tb.label.position.set(x, tb.def.radius + 1.5, z);
  });

  // naves/estações da camada ficção — órbita simples ao redor da posição atual do corpo-âncora
  // (Lua por padrão, mas pode ser qualquer planeta via def.anchor — Terra, Saturno etc.)
  moonShips.forEach(sh=>{
    const angle = (starSystemElapsed / sh.def.periodSec) * Math.PI * 2;
    const tilt = sh.def.tiltDeg * Math.PI/180;
    const r = sh.def.orbitRadius;
    const anchor = anchorPosition(sh.def.anchor || 'Moon');
    const lx = Math.cos(angle)*r, lzFlat = Math.sin(angle)*r;
    const ly = lzFlat*Math.sin(tilt), lz = lzFlat*Math.cos(tilt);
    sh.group.position.set(anchor.x+lx, anchor.y+ly, anchor.z+lz);
    sh.group.rotation.y = -angle; // label é filho do group, no eixo Y — não se move com essa rotação
  });

  // marcador e frota de fenômenos — acompanham a Lua, mas ficam mais afastados no fundo
  if (phenomenaMeshes[0]){
    const pm = phenomenaMeshes[0];
    pm.mesh.position.set(moonMesh.position.x+3.4, moonMesh.position.y+2.2, moonMesh.position.z-5.8);
    pm.mesh.rotation.z += dt*0.2;
    pm.label.position.set(pm.mesh.position.x, pm.mesh.position.y+1.5, pm.mesh.position.z);
  }
  phenomenaFleetShips.forEach((ship,i)=>{
    const drift = Math.sin(starSystemElapsed*0.9 + ship.phase)*0.35;
    ship.group.position.set(
      moonMesh.position.x - 5.8 + ship.spread*1.15,
      moonMesh.position.y + 1.1 + drift + (i%2)*0.55,
      moonMesh.position.z - 8.5 - Math.abs(ship.spread)*0.7
    );
    ship.group.rotation.y = starSystemElapsed*0.35 + ship.phase;
    ship.group.rotation.z = 0.18*Math.sin(starSystemElapsed + ship.phase);
  });
  if (flying && flyTarget){
    flyProgress = Math.min(1, flyProgress + dt*0.7);
    const ease = flyProgress*flyProgress*(3-2*flyProgress);
    const targetPos = flyTarget.position.clone();
    const desiredCamPos = targetPos.clone().add(flyOffset);
    camera.position.lerpVectors(flyStartPos, desiredCamPos, ease);
    const lookQuat = new THREE.Quaternion();
    const m = new THREE.Matrix4().lookAt(camera.position, targetPos, new THREE.Vector3(0,1,0));
    lookQuat.setFromRotationMatrix(m);
    camera.quaternion.slerpQuaternions(flyStartQuat, lookQuat, ease);
    if (flyProgress>=1){
      flying=false;
      const e = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ');
      yaw = e.y; pitch = e.x;
    }
  } else {
    const speed = groundMode ? 6*dt : (18 + camera.position.length()*0.05) * dt;
    if (moveState.fwd) camera.position.addScaledVector(forwardVec(), speed);
    if (moveState.back) camera.position.addScaledVector(forwardVec(), -speed);
    if (moveState.right) camera.position.addScaledVector(rightVec(), speed);
    if (moveState.left) camera.position.addScaledVector(rightVec(), -speed);
    if (moveState.up) camera.position.y += speed;
    if (moveState.down) camera.position.y -= speed;
    if (groundMode) camera.position.y = Math.max(1.2, Math.min(30, camera.position.y)); // não afunda no chão nem sai voando longe demais
  }

  Object.values(objects).forEach(o=>{
    const s = camera.position.distanceTo(o.label.position)*0.045;
    o.label.scale.set(o.label.scale.x, o.label.scale.y, 1);
  });

  renderer.render(scene, camera);
}
animate();

})();
</script>
</body>
